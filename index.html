<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Correlatividades Medicina UNLP</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Medicina UNLP – Plan 2004</h1>

<div class="top-bar">
<label>Año de ingreso:</label>
<input type="number" id="anioIngreso" value="2023">
<button onclick="guardarAnio()">Guardar</button>
</div><hr>

<!-- ===================== -->
<!-- LEGENDA -->
<!-- ===================== -->

<div class="legend-box">
<span>✅ Aprobada</span>
<span>🟨 Cursada Regular</span>
<span>🔄 Resetear</span>
</div>

<hr>

<div class="listas">

<!-- ===================== -->
<!-- APROBADAS -->
<!-- ===================== -->

<div class="box">
<h3 onclick="toggleBox(this)">Aprobadas ▾</h3>
<div class="box-content">
<ul id="aprobadas"></ul>
</div>
</div>

<!-- ===================== -->
<!-- REGULARIZADAS -->
<!-- ===================== -->

<div class="box regularizadas-box">

<h3 onclick="toggleBox(this)">Regularizadas ▾</h3>

<div class="box-content">

<div class="sub-section">
<h4>Puede rendir final</h4>
<ul id="puedeFinal"></ul>
</div>

<div class="sub-section">
<h4>No puede rendir final</h4>
<ul id="noPuedeFinal"></ul>
</div>

</div>
</div>

<!-- ===================== -->
<!-- PUEDE CURSAR -->
<!-- ===================== -->

<div class="box">
<h3 onclick="toggleBox(this)">Puede cursar ▾</h3>
<div class="box-content">
<ul id="puedeCursar"></ul>
</div>
</div>

<!-- ===================== -->
<!-- NO PUEDE CURSAR -->
<!-- ===================== -->

<div class="box">
<h3 onclick="toggleBox(this)">No puede cursar ▾</h3>
<div class="box-content">
<ul id="noPuedeCursar"></ul>
</div>
</div>

</div>

<script src="materias.js"></script>
<script src="app.js"></script>

</body>
</html>
