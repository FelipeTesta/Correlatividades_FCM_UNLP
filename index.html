<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Correlatividades Medicina UNLP</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Medicina UNLP – Plan 2004</h1>

<div class="top-bar">
<label>Año de ingreso:</label>
<input type="number" id="anioIngreso" value="2023">
<button onclick="guardarAnio()">Guardar</button>
</div>

<hr>

<div class="estado-panel">
<h2>Actualizar estado</h2>

<select id="materiaSelect"></select>

<select id="estadoSelect">
<option value="ninguno">Sin estado</option>
<option value="regularizada">Regularizada</option>
<option value="aprobada">Aprobada</option>
</select>

<button onclick="guardarEstado()">Guardar</button>
</div>

<hr>

<div class="listas">

<div>
<h3>Aprobadas</h3>
<ul id="aprobadas"></ul>
</div>

<div>
<h3>Regularizadas</h3>
<ul id="regularizadas"></ul>
</div>

<div>
<h3>Puede cursar</h3>
<ul id="puedeCursar"></ul>
</div>

<div>
<h3>No puede cursar</h3>
<ul id="noPuedeCursar"></ul>
</div>

<div>
<h3>Puede rendir final</h3>
<ul id="puedeFinal"></ul>
</div>

<div>
<h3>No puede rendir final</h3>
<ul id="noPuedeFinal"></ul>
</div>

</div>

<script src="materias.js"></script>
<script src="app.js"></script>

</body>
</html>
